name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate version format
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '$VERSION'. Expected semver (e.g. 1.2.3)."
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Update version in source
        run: |
          sed -i "s/const Version = \".*\"/const Version = \"${VERSION}\"/" edge/version.go
        env:
          VERSION: ${{ inputs.version }}

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add edge/version.go
          git commit -m "Bump version to ${VERSION}"
          git push
        env:
          VERSION: ${{ inputs.version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Publish
        env:
          CGO_ENABLED: 0
        run: |
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o ./publish/win-x64/edge-browser-history-cli.exe .
          GOOS=windows GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o ./publish/win-arm64/edge-browser-history-cli.exe .

      - name: Package artifacts
        run: |
          cd publish/win-x64 && zip -r ../../edge-browser-history-cli-win-x64.zip . && cd ../..
          cd publish/win-arm64 && zip -r ../../edge-browser-history-cli-win-arm64.zip . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            edge-browser-history-cli-win-x64.zip
            edge-browser-history-cli-win-arm64.zip

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Validate version format
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '$VERSION'. Expected semver (e.g. 1.2.3)."
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Update version in project file
        run: |
          sed -i "s/<Version>.*<\/Version>/<Version>${VERSION}<\/Version>/" EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj
          sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>${VERSION}<\/AssemblyVersion>/" EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj
          sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>${VERSION}<\/FileVersion>/" EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj
        env:
          VERSION: ${{ inputs.version }}

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj
          git commit -m "Bump version to ${VERSION}"
          git push
        env:
          VERSION: ${{ inputs.version }}

      - name: Restore dependencies
        run: dotnet restore edge-browser-history-cli.slnx

      - name: Build
        run: dotnet build edge-browser-history-cli.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test edge-browser-history-cli.slnx --no-build --configuration Release --verbosity normal

      - name: Publish
        run: |
          dotnet publish EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj --configuration Release --output ./publish/win-x64 --runtime win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true
          dotnet publish EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj --configuration Release --output ./publish/win-arm64 --runtime win-arm64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true
          dotnet publish EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj --configuration Release --output ./publish/linux-x64 --runtime linux-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package artifacts
        run: |
          cd publish/win-x64 && zip -r ../../edge-browser-history-cli-win-x64.zip . && cd ../..
          cd publish/win-arm64 && zip -r ../../edge-browser-history-cli-win-arm64.zip . && cd ../..
          cd publish/linux-x64 && tar -czf ../../edge-browser-history-cli-linux-x64.tar.gz . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            edge-browser-history-cli-win-x64.zip
            edge-browser-history-cli-win-arm64.zip
            edge-browser-history-cli-linux-x64.tar.gz

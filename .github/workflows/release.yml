name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Update version in project file
        run: |
          sed -i "s/<Version>.*<\/Version>/<Version>${{ inputs.version }}<\/Version>/" EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj
          sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>${{ inputs.version }}<\/AssemblyVersion>/" EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj
          sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>${{ inputs.version }}<\/FileVersion>/" EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj
          git commit -m "Bump version to ${{ inputs.version }}"
          git push

      - name: Restore dependencies
        run: dotnet restore edge-browser-history-cli.slnx

      - name: Build
        run: dotnet build edge-browser-history-cli.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test edge-browser-history-cli.slnx --no-build --configuration Release --verbosity normal

      - name: Publish
        run: |
          dotnet publish EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj --configuration Release --output ./publish/win-x64 --runtime win-x64 --self-contained true
          dotnet publish EdgeBrowserHistoryCli/EdgeBrowserHistoryCli.csproj --configuration Release --output ./publish/linux-x64 --runtime linux-x64 --self-contained true

      - name: Package artifacts
        run: |
          cd publish/win-x64 && zip -r ../../edge-browser-history-cli-win-x64.zip . && cd ../..
          cd publish/linux-x64 && tar -czf ../../edge-browser-history-cli-linux-x64.tar.gz . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            edge-browser-history-cli-win-x64.zip
            edge-browser-history-cli-linux-x64.tar.gz
